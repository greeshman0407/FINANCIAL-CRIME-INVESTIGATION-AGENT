<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FinGuard — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #060d1a;
      --surface: #0c1829;
      --border:  #1a3050;
      --accent:  #3b82f6;
      --text:    #e2eaf4;
      --muted:   #6b8aaa;
      --error:   #ef4444;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      justify-content: center;
    }
    .brand-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .brand-name { font-size: 20px; font-weight: 700; color: #fff; }
    .brand-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }

    h2 { font-size: 15px; font-weight: 600; margin-bottom: 20px; color: var(--text); text-align: center; }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 10px; font-weight: 600;
      color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.6px;
      margin-bottom: 5px;
    }
    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 13px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }
    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--error);
      border-radius: 8px;
      padding: 9px 13px;
      font-size: 13px;
      margin-bottom: 14px;
    }
    .btn {
      width: 100%;
      margin-top: 6px;
      padding: 12px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border: none; border-radius: 9px;
      color: #fff; font-size: 14px; font-weight: 600;
      font-family: inherit; cursor: pointer;
      box-shadow: 0 4px 15px rgba(59,130,246,0.3);
      transition: opacity 0.15s, box-shadow 0.15s;
    }
    .btn:hover { opacity: 0.92; box-shadow: 0 6px 20px rgba(59,130,246,0.4); }
    .footer { text-align: center; margin-top: 20px; font-size: 11px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon">🛡️</div>
      <div>
        <div class="brand-name">FinGuard</div>
        <div class="brand-sub">Financial Crime Intelligence</div>
      </div>
    </div>

    <h2>Authorized Access Only</h2>

    {% if error %}
    <div class="error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" autofocus autocomplete="off"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password"/>
      </div>
      <button class="btn" type="submit">🔐 Sign In</button>
    </form>

    <div class="footer">Access restricted to authorized personnel only.</div>
  </div>
</body>
</html>
